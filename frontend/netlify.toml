[build]
  command = "yarn build"
  publish = "build"

# SPA fallback — every route serves index.html so React Router can handle it
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache static assets (CRA hashes filenames)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
